<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="1;url=https://daily-earning.vercel.app">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>লোড হচ্ছে...</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #00c6ff, #0072ff);
      margin: 0;
      padding: 0;
      text-align: center;
      color: #fff;
    }

    .container {
      padding-top: 100px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
    }

    .loading-bar {
      margin: 30px auto;
      width: 80%;
      height: 10px;
      background: #ffffff33;
      border-radius: 5px;
      overflow: hidden;
      position: relative;
    }

    .loading-bar::before {
      content: "";
      position: absolute;
      width: 0%;
      height: 100%;
      background-color: #fff;
      animation: load 1s linear forwards;
    }

    @keyframes load {
      0% { width: 0%; }
      100% { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>⚡ অনুগ্রহ করে অপেক্ষা করুন...</h1>
    <p>আপনাকে রিডাইরেক্ট করা হচ্ছে বিজ্ঞাপনে</p>
    <div class="loading-bar"></div>
  </div>

</body>
</html>
